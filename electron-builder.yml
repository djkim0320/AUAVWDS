appId: com.auavwds.desktop
productName: AUAVWDS
directories:
  output: release
afterPack: scripts/afterPack.cjs
files:
  - dist/**
  - electron/**
  - package.json
asar: true
asarUnpack:
  - "**/*.node"
extraResources:
  - from: backend/dist
    to: backend
  - from: third_party/openvsp/win64
    to: bin/win64
win:
  signAndEditExecutable: false
  target:
    - target: dir
      arch:
        - x64
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

